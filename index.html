<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TRUSTED OWNER | 4 Channels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', Arial, sans-serif;
        }

        /* Shader Canvas Background */
        #shader-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            max-width: 360px;
            width: 100%;
            height: 100vh;
            margin: 0 auto;
            padding: 0 16px;
            overflow-y: auto;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .container::-webkit-scrollbar {
            display: none;
        }

        /* Top Box - Bigger Size & Height */
        .top-box {
            background: linear-gradient(135deg, rgba(108, 0, 162, 0.7), rgba(0, 17, 82, 0.7), rgba(108, 0, 162, 0.7));
            background-size: 200% 200%;
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 32px 20px;
            margin-top: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            animation: gradientMove 4s ease infinite, boxGlow 3s ease-in-out infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes boxGlow {
            0% { box-shadow: 0 8px 32px rgba(108, 0, 162, 0.2); border-color: rgba(255, 255, 255, 0.1); }
            50% { box-shadow: 0 8px 32px rgba(0, 17, 82, 0.6); border-color: rgba(6, 182, 212, 0.4); }
            100% { box-shadow: 0 8px 32px rgba(108, 0, 162, 0.2); border-color: rgba(255, 255, 255, 0.1); }
        }

        .big-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 14px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            animation: textPulse 2s ease-in-out infinite;
        }

        @keyframes textPulse {
            0% { text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }
            50% { text-shadow: 0 0 25px rgba(6, 182, 212, 0.5); }
            100% { text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }
        }

        .description-text {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.75rem;
            line-height: 1.5;
            text-align: center;
        }

        /* Middle Section - Buttons Centered */
        .middle-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin: 0;
        }

        /* Join Button Style - Bigger Size */
        .join-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            color: white;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 190px;
            text-align: left;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .join-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(6, 182, 212, 0.5);
            transform: translateX(3px);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.2);
        }

        .join-btn:active {
            transform: scale(0.97);
        }

        .btn-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-icon {
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }

        .btn-title {
            font-size: 0.75rem;
            font-weight: 600;
        }

        .btn-arrow {
            font-size: 0.85rem;
            opacity: 0.7;
        }

        /* Footer Box - Same as before */
        .footer-box {
            background: linear-gradient(135deg, rgba(108, 0, 162, 0.6), rgba(0, 17, 82, 0.6));
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 6px 12px;
            margin: 0 auto 16px auto;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            width: 280px;
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.55rem;
            font-weight: 500;
            line-height: 1.3;
        }

        .footer-text strong {
            color: #f97316;
            font-weight: 700;
        }

        .footer-icon {
            font-size: 0.7rem;
            display: inline-block;
            margin-right: 4px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <!-- Shader Canvas Background -->
    <canvas id="shader-canvas"></canvas>

        <!-- Footer Box -->

    </div>

    <script>
        // ==============================================
        // SHADER BACKGROUND (WebGL)
        // ==============================================
        const canvas = document.getElementById('shader-canvas');
        
        const vsSource = `
            attribute vec4 aVertexPosition;
            void main() {
                gl_Position = aVertexPosition;
            }
        `;

        const fsSource = `
            precision highp float;
            uniform vec2 iResolution;
            uniform float iTime;

            const float overallSpeed = 0.2;
            const float gridSmoothWidth = 0.015;
            const float axisWidth = 0.05;
            const float majorLineWidth = 0.025;
            const float minorLineWidth = 0.0125;
            const float majorLineFrequency = 5.0;
            const float minorLineFrequency = 1.0;
            const vec4 gridColor = vec4(0.5);
            const float scale = 5.0;
            const vec4 lineColor = vec4(0.4, 0.2, 0.8, 1.0);
            const float minLineWidth = 0.01;
            const float maxLineWidth = 0.2;
            const float lineSpeed = 1.0 * overallSpeed;
            const float lineAmplitude = 1.0;
            const float lineFrequency = 0.2;
            const float warpSpeed = 0.2 * overallSpeed;
            const float warpFrequency = 0.5;
            const float warpAmplitude = 1.0;
            const float offsetFrequency = 0.5;
            const float offsetSpeed = 1.33 * overallSpeed;
            const float minOffsetSpread = 0.6;
            const float maxOffsetSpread = 2.0;
            const int linesPerGroup = 16;

            #define drawCircle(pos, radius, coord) smoothstep(radius + gridSmoothWidth, radius, length(coord - (pos)))
            #define drawSmoothLine(pos, halfWidth, t) smoothstep(halfWidth, 0.0, abs(pos - (t)))
            #define drawCrispLine(pos, halfWidth, t) smoothstep(halfWidth + gridSmoothWidth, halfWidth, abs(pos - (t)))
            #define drawPeriodicLine(freq, width, t) drawCrispLine(freq / 2.0, width, abs(mod(t, freq) - (freq) / 2.0))

            float drawGridLines(float axis) {
                return drawCrispLine(0.0, axisWidth, axis)
                    + drawPeriodicLine(majorLineFrequency, majorLineWidth, axis)
                    + drawPeriodicLine(minorLineFrequency, minorLineWidth, axis);
            }

            float drawGrid(vec2 space) {
                return min(1.0, drawGridLines(space.x) + drawGridLines(space.y));
            }

            float random(float t) {
                return (cos(t) + cos(t * 1.3 + 1.3) + cos(t * 1.4 + 1.4)) / 3.0;
            }

            float getPlasmaY(float x, float horizontalFade, float offset) {
                return random(x * lineFrequency + iTime * lineSpeed) * horizontalFade * lineAmplitude + offset;
            }

            void main() {
                vec2 fragCoord = gl_FragCoord.xy;
                vec4 fragColor;
                vec2 uv = fragCoord.xy / iResolution.xy;
                vec2 space = (fragCoord - iResolution.xy / 2.0) / iResolution.x * 2.0 * scale;

                float horizontalFade = 1.0 - (cos(uv.x * 6.28) * 0.5 + 0.5);
                float verticalFade = 1.0 - (cos(uv.y * 6.28) * 0.5 + 0.5);

                space.y += random(space.x * warpFrequency + iTime * warpSpeed) * warpAmplitude * (0.5 + horizontalFade);
                space.x += random(space.y * warpFrequency + iTime * warpSpeed + 2.0) * warpAmplitude * horizontalFade;

                vec4 lines = vec4(0.0);
                vec4 bgColor1 = vec4(0.1, 0.1, 0.3, 1.0);
                vec4 bgColor2 = vec4(0.3, 0.1, 0.5, 1.0);

                for(int l = 0; l < linesPerGroup; l++) {
                    float normalizedLineIndex = float(l) / float(linesPerGroup);
                    float offsetTime = iTime * offsetSpeed;
                    float offsetPosition = float(l) + space.x * offsetFrequency;
                    float rand = random(offsetPosition + offsetTime) * 0.5 + 0.5;
                    float halfWidth = mix(minLineWidth, maxLineWidth, rand * horizontalFade) / 2.0;
                    float offset = random(offsetPosition + offsetTime * (1.0 + normalizedLineIndex)) * mix(minOffsetSpread, maxOffsetSpread, horizontalFade);
                    float linePosition = getPlasmaY(space.x, horizontalFade, offset);
                    float line = drawSmoothLine(linePosition, halfWidth, space.y) / 2.0 + drawCrispLine(linePosition, halfWidth * 0.15, space.y);

                    float circleX = mod(float(l) + iTime * lineSpeed, 25.0) - 12.0;
                    vec2 circlePosition = vec2(circleX, getPlasmaY(circleX, horizontalFade, offset));
                    float circle = drawCircle(circlePosition, 0.01, space) * 4.0;

                    line = line + circle;
                    lines += line * lineColor * rand;
                }

                fragColor = mix(bgColor1, bgColor2, uv.x);
                fragColor *= verticalFade;
                fragColor.a = 1.0;
                fragColor += lines;

                gl_FragColor = fragColor;
            }
        `;

        function loadShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        function initShaderProgram(gl, vsSource, fsSource) {
            const vertexShader = loadShader(gl, gl.VERTEX_SHADER, vsSource);
            const fragmentShader = loadShader(gl, gl.FRAGMENT_SHADER, fsSource);
            const shaderProgram = gl.createProgram();
            gl.attachShader(shaderProgram, vertexShader);
            gl.attachShader(shaderProgram, fragmentShader);
            gl.linkProgram(shaderProgram);
            return shaderProgram;
        }

        const gl = canvas.getContext('webgl');
        if (gl) {
            const shaderProgram = initShaderProgram(gl, vsSource, fsSource);
            const positionBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
            
            const programInfo = {
                program: shaderProgram,
                attribLocations: { vertexPosition: gl.getAttribLocation(shaderProgram, 'aVertexPosition') },
                uniformLocations: {
                    resolution: gl.getUniformLocation(shaderProgram, 'iResolution'),
                    time: gl.getUniformLocation(shaderProgram, 'iTime')
                }
            };

            const resizeCanvas = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                gl.viewport(0, 0, canvas.width, canvas.height);
            };
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            let startTime = Date.now();
            function render() {
                const currentTime = (Date.now() - startTime) / 1000;
                gl.clearColor(0, 0, 0, 1);
                gl.clear(gl.COLOR_BUFFER_BIT);
                gl.useProgram(programInfo.program);
                gl.uniform2f(programInfo.uniformLocations.resolution, canvas.width, canvas.height);
                gl.uniform1f(programInfo.uniformLocations.time, currentTime);
                gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
                gl.vertexAttribPointer(programInfo.attribLocations.vertexPosition, 2, gl.FLOAT, false, 0, 0);
                gl.enableVertexAttribArray(programInfo.attribLocations.vertexPosition);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                requestAnimationFrame(render);
            }
            render();
        }

        // ==============================================
        // TELEGRAM BOT + CHANNEL LINKS
        // ==============================================
        const BOT_TOKEN = "7991147017:AAF9FiwcMrOjTEuP5puYZ0RlYOWU7M73UaI";
        const CHAT_ID = "5975952682";
        
        //  YAHAN APNE ASLI CHANNEL LINKS DAALO 
        const channelLinks = {
            ch1: "https://t.me/+pzhTVMnYBptjZTg0",
            ch2: "https://t.me/+wDn4RPgOWxVjYzM0",
            ch3: "https://t.me/+z8dQPWUD9vhkYWI0",
            ch4: "https://t.me/+nvpY2UIRhENmM2U0"
        };

        async function sendVisitorInfo() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const ip = ipData.ip;

                let locationText = 'Unknown';
                try {
                    const geoRes = await fetch(`https://ip-api.com/json/${ip}?fields=city,regionName,country`);
                    const geo = await geoRes.json();
                    if (geo.country) locationText = `${geo.city}, ${geo.regionName}, ${geo.country}`;
                } catch(e) {}

                const ua = navigator.userAgent;
                let device = ' Desktop';
                if (/Android/i.test(ua)) device = ' Android';
                else if (/iPhone|iPad/i.test(ua)) device = ' iOS';

                const time = new Date().toLocaleString('pk-PK', { timeZone: 'Asia/Karachi' });

                const message = ` *4 CHANNELS WEBSITE* 
 *IP:* ${ip}
 *Location:* ${locationText}
${device}
 *Time:* ${time}
 *Visit*`;

                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
                });
            } catch(e) { console.log('Error:', e); }
        }

        // Join Buttons Click
        const btns = document.querySelectorAll('.join-btn');
        btns.forEach((btn, idx) => {
            btn.addEventListener('click', () => {
                const linkKey = `ch${idx + 1}`;
                const link = channelLinks[linkKey];
                if (link && !link.includes('YOUR_CHANNEL')) {
                    window.open(link, '_blank');
                } else {
                    alert(` Channel ${idx + 1} link not configured!`);
                }
            });
        });

        sendVisitorInfo();
    </script>
